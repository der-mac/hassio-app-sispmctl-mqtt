name: "Gembird SisPM MQTT Bridge"
description: "Steuert die Gembird SisPMCTL USB-Steckdosenleiste über MQTT mit Home Assistant Discovery"
version: "1.0.1"
slug: "sispmctl_mqtt"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
homeassistant: "2023.1.0"
startup: services
boot: auto
map: []
usb: true
hassio_api: false

options:
  device_id: "01:01:51:c7:30"
  device_name: "Gembird SisPM"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  poll_interval: 5

schema:
  device_id: str
  device_name: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: str
  poll_interval: int(1,60)
